<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Recettes - Gestion Rayons V2</title>
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/pages/recipes.css" />
</head>

<body class="app-page recipes-page">

  <div class="app-shell">

    <header class="topbar">
      <div>
        <h1>Recettes</h1>
        <p>Catalogue des recettes et compositions</p>
      </div>

      <a class="btn btn-muted" href="./home.html">
        ← Accueil
      </a>
    </header>

    <main class="main-content">

      <section class="welcome-card">
        <h2>Gestion des recettes</h2>
        <p>
          Créer, modifier et gérer les recettes de fabrication du rayon.
        </p>
      </section>

      <section class="recipes-layout">

        <!-- FORMULAIRE -->
        <section class="card recipe-form-card">

          <h2>Créer / modifier une recette</h2>

          <input id="recipeId" type="hidden" />

          <div class="recipe-form-grid">

            <label>
              Nom recette
              <input
                id="recipeName"
                class="input"
                placeholder="Ex : Plateau fruits de mer"
              />
            </label>

            <label>
              PLU produit fini
              <input
                id="outputPlu"
                class="input"
                placeholder="PLU produit fini"
              />
            </label>

            <label>
              Désignation produit fini
              <input
                id="outputDesignation"
                class="input"
                readonly
              />
            </label>

            <label>
              Quantité produite standard
              <input
                id="outputQuantity"
                class="input"
                type="number"
                step="0.001"
                value="1"
              />
            </label>

            <label>
              Unité
              <select id="outputUnit" class="input">
                <option value="kg">kg</option>
                <option value="piece">pièce</option>
                <option value="colis">colis</option>
              </select>
            </label>

            <label>
              DLC produit fini (jours)
              <input
                id="dlcDays"
                class="input"
                type="number"
                step="1"
                value="0"
              />
            </label>

          </div>

          <h3 class="recipe-section-title">
            Ingrédients
          </h3>

          <div
            id="ingredientsList"
            class="ingredients-list"
          ></div>

          <div class="recipe-actions">

            <button
              id="btnAddIngredient"
              class="btn btn-muted"
              type="button"
            >
              + Ajouter ingrédient
            </button>

          </div>

          <div class="recipe-field recipe-span-2">

            <label>
              Procédure
            </label>

            <textarea
              id="procedure"
              class="input"
              rows="5"
              placeholder="Procédure de préparation..."
            ></textarea>

          </div>

          <div class="recipe-actions">

            <button
              id="btnSaveRecipe"
              class="btn btn-primary"
              type="button"
            >
              Enregistrer recette
            </button>

            <button
              id="btnResetRecipe"
              class="btn btn-muted"
              type="button"
            >
              Réinitialiser
            </button>

          </div>

        </section>

        <!-- LISTE -->
        <section class="card recipe-list-card">

          <h2>Recettes existantes</h2>

          <div
            id="recipesList"
            class="recipes-list"
          >
            Chargement...
          </div>

        </section>

      </section>

    </main>

  </div>

  <script src="./js/config.js"></script>
  <script type="module" src="./js/recipes.js?v=3"></script>

</body>
</html>
