<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Fournisseurs - Gestion Commerciale</title>

  <link rel="stylesheet" href="./css/app.css" />
</head>

<body class="app-page">
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="app-title">Gestion Commerciale</h1>
      <p class="app-subtitle">Fournisseurs</p>
    </div>

    <div class="topbar-right">
      <div class="user-box">
        <span id="user-name">Utilisateur</span>
      </div>

      <button id="back-home-btn" class="btn btn-secondary">Accueil</button>
      <button id="logout-btn" class="btn btn-secondary">Déconnexion</button>
    </div>
  </header>

  <main class="suppliers-page">
    <section class="suppliers-card">
      <div class="page-actions">
        <div>
          <h2>Fournisseurs</h2>
          <p>Gère les fournisseurs, mareyeurs, criées, importateurs et partenaires logistiques.</p>
        </div>

        <div class="page-actions-right">
          <button id="add-supplier-btn" class="btn btn-primary">
            + Nouveau fournisseur
          </button>
        </div>
      </div>
    </section>

    <section class="suppliers-card">
      <div class="suppliers-filters">
        <div class="suppliers-field">
          <label for="search-input">Recherche</label>
          <input
            id="search-input"
            type="search"
            placeholder="Nom, code, contact, ville..."
          />
        </div>

        <div class="suppliers-field">
          <label for="status-filter">Statut</label>
          <select id="status-filter">
            <option value="all">Tous</option>
            <option value="active">Actifs</option>
            <option value="inactive">Inactifs</option>
            <option value="blocked">Bloqués</option>
          </select>
        </div>

        <div class="suppliers-field">
          <label for="type-filter">Type</label>
          <select id="type-filter">
            <option value="all">Tous</option>
            <option value="standard">Standard</option>
            <option value="mareyeur">Mareyeur</option>
            <option value="criee">Criée</option>
            <option value="importateur">Importateur</option>
            <option value="transporteur">Transporteur</option>
            <option value="emballage">Emballage</option>
            <option value="autre">Autre</option>
          </select>
        </div>

        <div class="suppliers-field">
          <label>&nbsp;</label>
          <button id="reset-filters-btn" class="btn btn-secondary">
            Réinitialiser
          </button>
        </div>
      </div>
    </section>

    <section class="suppliers-card">
      <div id="page-feedback" class="page-feedback hidden"></div>

      <div class="table-wrap">
        <table class="suppliers-table">
          <thead>
            <tr>
              <th>Code</th>
              <th>Nom</th>
              <th>Type</th>
              <th>Contact</th>
              <th>Téléphone</th>
              <th>Email</th>
              <th>Ville</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>

          <tbody id="suppliers-tbody">
            <tr>
              <td colspan="9">Chargement...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/suppliers.js?v=1"></script>
</body>
</html>
