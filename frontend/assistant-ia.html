<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Assistant IA - ALTA MARÉE</title>
  <link rel="icon" type="image/png" href="/assets/favicon.png?v=7">
  <link rel="shortcut icon" type="image/png" href="/assets/favicon.png?v=7">
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/pages/assistant-ia.css?v=1" />
</head>
<body class="app-page ai-page">
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="app-title">ALTA MARÉE</h1>
      <p class="app-subtitle">Assistant IA commercial</p>
    </div>
    <div class="topbar-right">
      <div class="user-box"><span id="user-name">Utilisateur</span></div>
      <button id="home-btn" class="btn btn-secondary">Accueil</button>
      <button id="logout-btn" class="btn btn-secondary">Déconnexion</button>
    </div>
  </header>

  <main class="main-content ai-layout">
    <section class="welcome-card ai-intro">
      <div>
        <h2>Agent IA métier</h2>
        <p>Analyse en lecture seule du stock, des clients, des fournisseurs, des ventes, des achats et des marges.</p>
      </div>
      <span class="ai-mode-badge">Lecture seule</span>
    </section>

    <section class="ai-quick-actions" aria-label="Questions rapides">
      <button class="btn btn-secondary" data-prompt="Que dois-je vendre aujourd'hui, quels clients relancer et quels produits proposer ?">Recommandations commerciales</button>
      <button class="btn btn-secondary" data-prompt="Génère un brouillon d'email commercial à partir des recommandations commerciales disponibles. Ne l'envoie pas.">Générer email commercial</button>
      <button class="btn btn-secondary" data-prompt="Génère un brouillon WhatsApp à partir des recommandations commerciales disponibles. Ne l'envoie pas.">Générer WhatsApp</button>
      <button class="btn btn-secondary" data-prompt="Génère une offre commerciale brouillon à partir des recommandations commerciales disponibles. Ne l'enregistre pas et ne l'envoie pas.">Générer offre commerciale</button>
      <button class="btn btn-secondary" data-prompt="Résume mon stock disponible.">Résumer le stock</button>
      <button class="btn btn-secondary" data-prompt="Quels lots arrivent bientôt en DLC ?">DLC proches</button>
      <button class="btn btn-secondary" data-prompt="Quels clients dois-je relancer ?">Clients à relancer</button>
      <button class="btn btn-secondary" data-prompt="Analyse mes ventes récentes et mes top clients.">Analyse des ventes</button>
      <button class="btn btn-secondary" data-prompt="Quels articles ont la meilleure marge et lesquels sont à surveiller ?">Analyse des marges</button>
      <button class="btn btn-secondary" data-prompt="Quels fournisseurs ai-je le plus utilisés récemment ?">Fournisseurs récents</button>
    </section>

    <section class="card ai-chat-card" aria-label="Conversation Assistant IA">
      <div id="ai-feedback" class="page-feedback hidden"></div>
      <div id="chat-history" class="ai-chat-history" aria-live="polite"></div>

      <form id="chat-form" class="ai-chat-form">
        <div class="form-group ai-input-group">
          <label for="message-input">Message</label>
          <textarea id="message-input" rows="3" placeholder="Pose une question métier..." required></textarea>
        </div>
        <button id="send-btn" class="btn btn-primary" type="submit">Envoyer</button>
      </form>
    </section>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/assistant-ia.js?v=98"></script>
</body>
</html>
