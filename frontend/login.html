<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion - ALTA MARÉE</title>
  <link rel="icon" href="/assets/favicon.png?v=4" type="image/png" />
  <link rel="shortcut icon" href="/assets/favicon.png?v=4" type="image/png" />
  <link rel="apple-touch-icon" href="/assets/favicon.png?v=4" />
  <link rel="stylesheet" href="./css/app.css" />
</head>
<body class="auth-page">
  <div class="auth-card">
    <div class="brand-block">
      <h1>ALTA MARÉE</h1>
      <p>Connexion à votre espace magasin</p>
    </div>

    <form id="login-form" class="form-card">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="exemple@magasin.fr" required />
      </div>

      <div class="form-group">
        <label for="password">Mot de passe</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>

      <button type="submit" class="btn btn-primary btn-full">Se connecter</button>

      <p id="login-error" class="error-text"></p>
    </form>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/login.js?v=3"></script>
</body>
</html>
