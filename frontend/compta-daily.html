<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Comptabilité V2</title>

  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/pages/compta-daily.css?v=2" />
</head>
<body class="app-page">

  <header class="topbar">
  <div class="topbar-left">
    <h1 class="app-title">Comptabilité Journalière</h1>
    <p class="app-subtitle">Pilotage quotidien du rayon</p>
  </div>

  <div class="topbar-right">
    <button id="back-compta-home-btn" class="btn btn-secondary">
      Comptabilité
    </button>

    <button id="logout-btn" class="btn btn-secondary">
      Déconnexion
    </button>
  </div>
</header>

  <div class="compta-page">

    <div class="page-header">
      <h1>Comptabilité Journalière</h1>
    </div>

    <div class="card">

      <div class="compta-grid">

        <div class="compta-field">
          <label>Date</label>
          <input type="date" id="closure-date" />
        </div>

        <div class="compta-field">
          <label>CA réel HT</label>
          <input type="number" step="0.01" id="ca-real-ht" />
        </div>

        <div class="compta-field">
          <label>CA N-1 HT</label>
          <input type="number" step="0.01" id="ca-n1-ht" />
        </div>

        <div class="compta-field">
          <label>Stock fin HT</label>
          <input type="number" step="0.01" id="stock-end-ht" />
        </div>

      </div>

      <div class="compta-field">
        <label>Notes</label>
        <textarea id="notes"></textarea>
      </div>

      <div class="compta-actions">
        <button id="save-btn">Enregistrer</button>
        <button id="compute-btn">Calculer</button>
        <button id="validate-btn">Valider journée</button>
      </div>

    </div>

    <div class="compta-results-grid">
  <div class="compta-result-card">
    <h2>Calcul réel</h2>
    <div id="real-results"></div>
  </div>

  <div class="compta-result-card">
    <h2>Calcul théorique</h2>
    <div id="theoretical-results"></div>
  </div>

  <div class="compta-result-card">
    <h2>Écarts</h2>
    <div id="delta-results"></div>
  </div>
</div>

<div class="card compta-analysis-card">
  <div class="compta-analysis-header">
    <h2>Analyse théorique articles</h2>

    <label>
      <input type="checkbox" id="anomalies-only" />
      Anomalies uniquement
    </label>
  </div>

  <div class="table-wrapper">
    <table class="compta-analysis-table">
      <thead>
        <tr>
          <th>PLU</th>
          <th>Désignation</th>
          <th>Qté</th>
          <th>Unité</th>
          <th>PV HT</th>
          <th>Coût HT</th>
          <th>CA théorique</th>
          <th>Marge</th>
          <th>%</th>
          <th>Anomalie</th>
        </tr>
      </thead>

      <tbody id="article-analysis-body">
        <tr>
          <td colspan="10">
            Lance un calcul pour charger l’analyse.
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>

    </div>

  <script src="./js/config.js"></script>
<script type="module" src="./js/compta-daily.js?v=5"></script>

</body>
</html>
