<!doctype html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Détail fabrication - Gestion Rayons V2</title>
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/pages/fabrication-detail.css" />
</head>

<body class="app-page">
  <header class="topbar">
    <div>
      <h1>Détail fabrication</h1>
      <p id="fabricationSubtitle">Chargement...</p>
    </div>

    <div class="actions">
      <a class="btn btn-secondary" href="./fabrications.html">← Fabrications</a>
      <a class="btn btn-secondary" href="./home.html">Accueil</a>
    </div>
  </header>

  <main class="main-content">
    <section class="welcome-card">
      <h2 id="fabricationNameTitle">Fabrication</h2>

      <div class="form-grid">
        <label>
          Nom
          <input id="fabricationName" class="input" />
        </label>

        <label>
          Statut
          <select id="fabricationStatus" class="input">
            <option value="draft">Brouillon</option>
            <option value="in_progress">En cours</option>
            <option value="cancelled">Annulée</option>
          </select>
        </label>

        <label>
          Quantité prévue
          <input id="plannedQuantity" class="input" type="number" step="0.001" />
        </label>

        <label>
          Quantité produite réelle
          <input id="producedQuantity" class="input" type="number" step="0.001" />
        </label>

        <label>
          Unité
          <input id="outputUnit" class="input" readonly />
        </label>

        <label>
          DLC produit fini
          <input id="dlcDate" class="input" type="date" />
        </label>
      </div>

      <label>
        Notes
        <textarea id="fabricationNotes" class="input" rows="4"></textarea>
      </label>

      <div class="actions">
        <button id="btnSaveFabrication" class="btn btn-primary">Enregistrer</button>
        <button id="btnPrintFabrication" class="btn btn-secondary">
  Imprimer fiche
</button>
        <button id="btnDeleteFabrication" class="btn btn-danger">Supprimer</button>
        <button id="btnValidateFabrication" class="btn btn-primary">Valider fabrication</button>
      </div>
    </section>

    <section class="card">
      <h2>Produit fini</h2>
      <p id="outputArticleBox">-</p>
    </section>

    <section class="card">
      <h2>Ingrédients</h2>
      <div id="fabricationLines">Chargement...</div>
    </section>
  </main>

  <script src="./js/config.js"></script>
  <script type="module" src="./js/fabrication-detail.js?v=5"></script>
</body>
</html>
