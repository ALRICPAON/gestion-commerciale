<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Détail vente - Gestion Rayons V2</title>
  <link rel="stylesheet" href="./css/app.css?v=2" />
  <link rel="stylesheet" href="./css/pages/sale-detail.css" />
</head>
<body class="app-page sale-detail-page">
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="app-title">Gestion Rayons V2</h1>
      <p class="app-subtitle">Détail vente / sortie</p>
    </div>

    <div class="topbar-right">
      <div class="topbar-department-box">
        <label for="topbar-department-select" class="topbar-label">Rayon actif</label>
        <select id="topbar-department-select" class="topbar-select"></select>
      </div>

      <div class="user-box">
        <span id="user-name">Utilisateur</span>
      </div>

      <button id="back-sales-btn" class="btn btn-secondary">← Retour ventes</button>
      <button id="logout-btn" class="btn btn-secondary">Déconnexion</button>
    </div>
  </header>

  <main class="main-content">
    <section class="welcome-card">
      <div class="page-actions">
        <div>
          <h2>Détail vente</h2>
          <p>
            Rayon actif :
            <strong id="current-department-name">-</strong>
          </p>
        </div>

        <div class="page-actions-right">
          <button id="cancel-validation-btn" class="btn btn-secondary hidden">↩️ Annuler validation</button>
          <button id="save-sale-btn" class="btn btn-primary">💾 Enregistrer</button>
          <button id="validate-sale-btn" class="btn btn-primary">✅ Valider sortie</button>
          <button id="add-line-btn" class="btn btn-secondary">➕ Ajouter ligne</button>
        </div>
      </div>
    </section>

    <section class="card">
      <h3>En-tête vente</h3>
      <div id="sale-header-feedback" class="page-feedback hidden"></div>

      <div class="form-grid">
        <div class="form-group">
          <label for="sale-document-date">Date document</label>
          <input type="date" id="sale-document-date" />
        </div>

        <div class="form-group">
          <label for="sale-document-type">Type</label>
          <select id="sale-document-type">
            <option value="manual_sale">Vente manuelle</option>
            <option value="inventory_sale">Vente inventaire</option>
            <option value="transfer_out">Rétrocession</option>
            <option value="waste">Casse / perte</option>
          </select>
        </div>

        <div class="form-group">
          <label for="sale-status">Statut</label>
          <select id="sale-status">
            <option value="draft">Brouillon</option>
            <option value="validated">Validé</option>
            <option value="cancelled">Annulé</option>
          </select>
        </div>

        <div class="form-group">
          <label for="sale-origin">Origine</label>
          <select id="sale-origin">
            <option value="manual">Manuel</option>
            <option value="inventory_import">Inventaire</option>
            <option value="interdepartment">Inter-rayon</option>
            <option value="adjustment">Ajustement</option>
          </select>
        </div>

        <div class="form-group">
          <label for="sale-reference-number">Référence</label>
          <input type="text" id="sale-reference-number" />
        </div>

        <div class="form-group">
          <label for="sale-source-inventory-date">Date inventaire source</label>
          <input type="date" id="sale-source-inventory-date" />
        </div>

        <div class="form-group form-group-span-2">
          <label for="sale-notes">Notes</label>
          <textarea id="sale-notes" rows="3"></textarea>
        </div>
      </div>
    </section>

    <section class="card sale-detail-card">
      <div class="page-actions">
        <div>
          <h3>Lignes vente</h3>
          <p class="helper-text">
            Saisie PLU puis quantité, prix TTC, motif
          </p>
        </div>
      </div>

      <div id="sale-lines-feedback" class="page-feedback hidden"></div>

      <div class="purchase-lines-wrap">
        <table class="data-table purchase-lines-table">
          <thead>
            <tr>
              <th>PLU</th>
              <th>Article</th>
              <th>Qté</th>
              <th>Unité</th>
              <th>PV TTC</th>
              <th>Total TTC</th>
              <th>Coût HT</th>
              <th>Marge HT</th>
              <th>Motif</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="sale-lines-table-body">
            <tr>
              <td colspan="11">Chargement...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/sale-detail.js?v=3"></script>
</body>
</html>
