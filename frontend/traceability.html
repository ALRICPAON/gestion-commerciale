<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Traçabilité - Scorpa Seafood / Gestion Commerciale</title>
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/pages/traceability.css?v=1" />
</head>
<body class="app-page">
  <header class="topbar">
    <div>
      <h1 class="app-title">Scorpa Seafood / Gestion Commerciale</h1>
      <p class="app-subtitle">Traçabilité des lots</p>
    </div>

    <div class="topbar-right">
      <div class="user-box">
        <span id="user-name">Utilisateur</span>
      </div>
      <button id="back-home-btn" class="btn btn-secondary">Accueil</button>
      <button id="logout-btn" class="btn btn-secondary">Déconnexion</button>
    </div>
  </header>

  <main class="main-content traceability-page">
    <section class="card trace-filters-card">
      <div class="trace-filters-grid">
        <div class="form-group">
          <label for="filter-from">Du</label>
          <input type="date" id="filter-from" class="input" />
        </div>

        <div class="form-group">
          <label for="filter-to">Au</label>
          <input type="date" id="filter-to" class="input" />
        </div>

        <div class="form-group">
          <label for="filter-plu">PLU</label>
          <input type="text" id="filter-plu" class="input" placeholder="Ex : 3065" />
        </div>

        <div class="form-group">
          <label for="filter-supplier">Fournisseur</label>
          <input type="text" id="filter-supplier" class="input" placeholder="Nom fournisseur" />
        </div>

        <div class="form-group">
          <label for="filter-status">Statut lot</label>
          <select id="filter-status" class="input">
            <option value="">Tous</option>
            <option value="open">Ouverts</option>
            <option value="closed">Fermés</option>
          </select>
        </div>

        <div class="form-group">
          <label for="filter-source-type">Origine</label>
          <select id="filter-source-type" class="input">
            <option value="">Toutes</option>
            <option value="purchase">Achat</option>
            <option value="transformation">Transformation</option>
            <option value="fabrication">Fabrication</option>
          </select>
        </div>

        <div class="form-group">
          <label for="filter-movement-type">Type mouvement</label>
          <select id="filter-movement-type" class="input">
            <option value="">Tous</option>
            <option value="purchase_in">Entrée achat</option>
            <option value="sale_out">Sortie vente</option>
            <option value="inventory_sale_out">Sortie inventaire</option>
            <option value="transformation_out">Sortie transformation</option>
            <option value="transformation_in">Entrée transformation</option>
          </select>
        </div>

        <div class="form-group trace-filter-actions">
          <label>&nbsp;</label>
          <button id="btn-apply-filters" class="btn btn-primary">Appliquer</button>
        </div>
      </div>
    </section>

    <section class="trace-summary-row">
      <div class="card trace-summary-card">
        <div class="trace-summary-label">Lots affichés</div>
        <div id="trace-count" class="trace-summary-value">0</div>
      </div>

      <div class="card trace-summary-card">
        <div class="trace-summary-label">Chargement</div>
        <div id="trace-loading-state" class="trace-summary-value trace-loading-idle">Prêt</div>
      </div>
    </section>

    <section class="trace-list-section">
      <div id="trace-list" class="trace-list"></div>

      <div class="trace-loadmore-wrap">
        <button id="btn-load-more" class="btn btn-secondary" style="display:none;">
          Charger plus
        </button>
      </div>
    </section>
  </main>

  <div id="trace-lot-modal" class="trace-modal hidden">
    <div class="trace-modal-backdrop" data-close-modal="true"></div>

    <div class="trace-modal-panel">
      <div class="trace-modal-header">
        <div>
          <h2 id="trace-modal-title">Détail lot</h2>
          <p id="trace-modal-subtitle" class="trace-modal-subtitle"></p>
        </div>
        <button id="trace-modal-close" class="btn btn-secondary">Fermer</button>
      </div>

      <div id="trace-modal-body" class="trace-modal-body">
        <div class="trace-empty">Chargement…</div>
      </div>
    </div>
  </div>

  <div id="trace-image-modal" class="trace-modal hidden">
    <div class="trace-modal-backdrop" data-close-image="true"></div>
    <div class="trace-image-panel">
      <button id="trace-image-close" class="btn btn-secondary trace-image-close-btn">Fermer</button>
      <img id="trace-image-preview" src="" alt="Photo traçabilité" />
    </div>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/traceability.js?v=7"></script>
</body>
</html>
