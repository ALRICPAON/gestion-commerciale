<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Détail fournisseur - Gestion Commerciale</title>

  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/pages/suppliers.css?v=4" />
</head>

<body class="app-page supplier-detail-page">
  <header class="topbar">
    <div class="topbar-left">
      <h1 class="app-title">Gestion Commerciale</h1>
      <p class="app-subtitle" id="page-subtitle">Détail fournisseur</p>
    </div>

    <div class="topbar-right">
      <div class="user-box">
        <span id="user-name">Utilisateur</span>
      </div>

      <button type="button" id="back-list-btn" class="btn btn-secondary">Fournisseurs</button>
      <button type="button" id="back-home-btn" class="btn btn-secondary">Accueil</button>
      <button type="button" id="logout-btn" class="btn btn-secondary">Déconnexion</button>
    </div>
  </header>

  <main class="main-content">
    <section class="suppliers-card">
      <div class="page-actions">
        <div>
          <h2 id="form-title">Nouveau fournisseur</h2>
          <p id="form-description">Crée ou modifie la fiche fournisseur.</p>
        </div>

        <div class="page-actions-right">
          <button type="button" id="save-supplier-btn" class="btn btn-primary">
            Enregistrer
          </button>

          <button type="button" id="status-supplier-btn" class="btn btn-secondary hidden">
            Désactiver
          </button>
        </div>
      </div>

      <div id="page-feedback" class="page-feedback hidden"></div>
    </section>

    <form id="supplier-form">
      <section class="suppliers-card">
        <h3>Identité</h3>

        <div class="form-grid">
          <div class="suppliers-field">
            <label for="code">Code fournisseur</label>
            <input id="code" name="code" type="text" placeholder="Ex : SCORPA" />
          </div>

          <div class="suppliers-field">
            <label for="name">Nom *</label>
            <input id="name" name="name" type="text" required placeholder="Nom fournisseur" />
          </div>

          <div class="suppliers-field">
            <label for="legal_name">Raison sociale</label>
            <input id="legal_name" name="legal_name" type="text" />
          </div>

          <div class="suppliers-field">
            <label for="supplier_type">Type</label>
            <select id="supplier_type" name="supplier_type">
              <option value="standard">Standard</option>
              <option value="mareyeur">Mareyeur</option>
              <option value="criee">Criée</option>
              <option value="importateur">Importateur</option>
              <option value="transporteur">Transporteur</option>
              <option value="emballage">Emballage</option>
              <option value="autre">Autre</option>
            </select>
          </div>

          <div class="suppliers-field">
            <label for="status">Statut</label>
            <select id="status" name="status">
              <option value="active">Actif</option>
              <option value="inactive">Inactif</option>
              <option value="blocked">Bloqué</option>
            </select>
          </div>
        </div>
      </section>

      <section class="suppliers-card">
        <h3>Contact</h3>

        <div class="form-grid">
          <div class="suppliers-field">
            <label for="contact_name">Contact principal</label>
            <input id="contact_name" name="contact_name" type="text" />
          </div>

          <div class="suppliers-field">
            <label for="phone">Téléphone</label>
            <input id="phone" name="phone" type="tel" />
          </div>

          <div class="suppliers-field">
            <label for="mobile">Mobile</label>
            <input id="mobile" name="mobile" type="tel" />
          </div>

          <div class="suppliers-field">
            <label for="email">Email</label>
            <input id="email" name="email" type="email" />
          </div>
        </div>
      </section>

      <section class="suppliers-card">
        <h3>Adresse</h3>

        <div class="form-grid">
          <div class="suppliers-field form-group-span-2">
            <label for="address_line1">Adresse</label>
            <input id="address_line1" name="address_line1" type="text" />
          </div>

          <div class="suppliers-field form-group-span-2">
            <label for="address_line2">Complément adresse</label>
            <input id="address_line2" name="address_line2" type="text" />
          </div>

          <div class="suppliers-field">
            <label for="postal_code">Code postal</label>
            <input id="postal_code" name="postal_code" type="text" />
          </div>

          <div class="suppliers-field">
            <label for="city">Ville</label>
            <input id="city" name="city" type="text" />
          </div>

          <div class="suppliers-field">
            <label for="country">Pays</label>
            <input id="country" name="country" type="text" value="France" />
          </div>
        </div>
      </section>

      <section class="suppliers-card">
        <h3>Administratif & conditions</h3>

        <div class="form-grid">
          <div class="suppliers-field">
            <label for="vat_number">N° TVA</label>
            <input id="vat_number" name="vat_number" type="text" />
          </div>

          <div class="suppliers-field">
            <label for="siret">SIRET</label>
            <input id="siret" name="siret" type="text" />
          </div>

          <div class="suppliers-field">
            <label for="payment_terms">Conditions de paiement</label>
            <input id="payment_terms" name="payment_terms" type="text" placeholder="Ex : 30 jours fin de mois" />
          </div>

          <div class="suppliers-field">
            <label for="delivery_terms">Conditions de livraison</label>
            <input id="delivery_terms" name="delivery_terms" type="text" placeholder="Ex : Franco, départ atelier..." />
          </div>
        </div>
      </section>

      <section class="suppliers-card">
        <h3>Notes</h3>

        <div class="suppliers-field">
          <label for="notes">Notes internes</label>
          <textarea id="notes" name="notes" rows="5"></textarea>
        </div>
      </section>
    </form>
    <section class="suppliers-card" id="contacts-section">
      <div class="page-actions">
        <div><h3>Contacts</h3></div>
        <button type="button" id="add-contact-btn" class="btn btn-secondary">Ajouter contact</button>
      </div>
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr><th>Nom</th><th>Rôle</th><th>Email</th><th>Téléphone</th><th>Usage</th><th>Statut</th><th>Actions</th></tr>
          </thead>
          <tbody id="contacts-table-body"><tr><td colspan="7">Aucun contact.</td></tr></tbody>
        </table>
      </div>
      <form id="contact-form" class="form-grid hidden">
        <input id="contact-form-id" type="hidden" />
        <div class="suppliers-field"><label for="contact-form-name">Nom *</label><input id="contact-form-name" type="text" required /></div>
        <div class="suppliers-field"><label for="contact-form-role">Fonction / service</label><input id="contact-form-role" type="text" /></div>
        <div class="suppliers-field"><label for="contact-form-email">Email</label><input id="contact-form-email" type="email" /></div>
        <div class="suppliers-field"><label for="contact-form-phone">Téléphone</label><input id="contact-form-phone" type="tel" /></div>
        <div class="suppliers-field"><label for="contact-form-mobile">Mobile</label><input id="contact-form-mobile" type="tel" /></div>
        <div class="suppliers-field"><label for="contact-form-status">Statut</label><select id="contact-form-status"><option value="active">Actif</option><option value="inactive">Inactif</option></select></div>
        <div class="suppliers-field"><label><input id="contact-form-primary" type="checkbox" /> Contact principal</label></div>
        <div class="suppliers-field"><label><input id="contact-form-purchase-orders" type="checkbox" /> Bons de commande</label></div>
        <div class="suppliers-field"><label><input id="contact-form-price-requests" type="checkbox" /> Demandes tarif</label></div>
        <div class="suppliers-field"><label><input id="contact-form-delivery-claims" type="checkbox" /> Réclamations BL</label></div>
        <div class="suppliers-field"><label><input id="contact-form-accounting" type="checkbox" /> Documents comptables</label></div>
        <div class="suppliers-field form-group-span-2"><label for="contact-form-notes">Notes</label><textarea id="contact-form-notes" rows="3"></textarea></div>
        <div class="page-actions-right form-group-span-2"><button type="button" id="cancel-contact-btn" class="btn btn-secondary">Annuler</button><button type="submit" id="save-contact-btn" class="btn btn-primary">Enregistrer contact</button></div>
      </form>
    </section>
  </main>

  <script src="./js/config.js"></script>
  <script src="./js/supplier-detail.js?v=2"></script>
</body>
</html>
