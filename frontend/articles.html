<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles - Scorpa Seafood / Gestion Commerciale</title>
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/pages/articles.css" />
</head>
<body class="app-page">
  <header class="topbar">
    <div>
      <h1 class="app-title">Scorpa Seafood / Gestion Commerciale</h1>
      <p class="app-subtitle">Gestion des articles</p>
    </div>

    <div class="topbar-right">
      <div class="user-box">
        <span id="user-name">Utilisateur</span>
      </div>

      <div class="department-switcher">
        <label for="department-select">Rayon :</label>
        <select id="department-select"></select>
      </div>

      <button id="back-home-btn" class="btn btn-secondary">Accueil</button>
      <button id="logout-btn" class="btn btn-secondary">Déconnexion</button>
    </div>
  </header>

  <main class="main-content">
    <section class="welcome-card">
      <div class="card-header-row">
        <div>
          <h2>Articles</h2>
          <p>Recherche, filtres et gestion des articles du magasin. Le rayon actif définit vos droits d’action.</p>
        </div>
        <button id="create-article-btn" class="btn btn-primary">+ Créer un article</button>
      </div>

      <div class="filters-grid">
        <div class="form-group">
          <label for="search-input">Recherche</label>
          <input
            type="text"
            id="search-input"
            placeholder="PLU, désignation, nom latin..."
          />
        </div>

        <div class="form-group">
          <label for="sector-filter">Secteur</label>
          <select id="sector-filter">
            <option value="">Tous</option>
            <option value="TRAD">TRAD</option>
            <option value="LS">LS</option>
            <option value="EMB">EMB</option>
            <option value="SCE">SCE</option>
            <option value="FE">FE</option>
          </select>
        </div>

        <div class="form-group">
  <label for="article-department-filter">Rayon des articles</label>
  <select id="article-department-filter">
    <option value="">Tous les rayons</option>
  </select>
</div>

        <div class="form-group">
          <label for="status-filter">Statut</label>
          <select id="status-filter">
            <option value="">Tous</option>
            <option value="true">Actifs</option>
            <option value="false">Inactifs</option>
          </select>
        </div>

        <div class="form-group filter-actions">
          <label>&nbsp;</label>
          <button id="refresh-btn" class="btn btn-secondary">Actualiser</button>
        </div>
      </div>
    </section>

    <section class="welcome-card">
      <div id="articles-feedback" class="feedback-box"></div>

      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>PLU</th>
<th>Désignation</th>
<th>Rayon</th> <!-- AJOUT -->
<th>Secteur</th>
<th>Unité</th>
<th>TVA</th>
<th>Catégorie</th>
<th>Statut</th>
<th>Actions</th>
            </tr>
          </thead>
          <tbody id="articles-tbody">
            <tr>
              <td colspan="9">Chargement des articles...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="article-modal" class="modal-overlay hidden">
    <div class="modal-card article-modal-card">
      <div class="modal-header">
        <h3 id="modal-title">Créer un article</h3>
        <button id="close-modal-btn" class="btn btn-secondary">Fermer</button>
      </div>

      <form id="article-form" class="modal-form">
        <input type="hidden" id="article-id" />

        <div class="form-grid">
          <div class="form-group">
            <label for="article-plu">PLU</label>
            <input type="text" id="article-plu" required />
          </div>

          <div class="form-group">
            <label for="article-designation">Désignation</label>
            <input type="text" id="article-designation" required />
          </div>

          <div class="form-group">
            <label for="article-unit">Unité</label>
    <select id="article-unit">
  <option value="">-- Choisir --</option>
  <option value="kg">kg</option>
  <option value="piece">piece</option>
  <option value="barquette">barquette</option>
  <option value="colis">colis</option>
  <option value="sachet">sachet</option>
  <option value="pot">pot</option>
  <option value="bocal">bocal</option>
  <option value="litre">litre</option>
  <option value="unite">unite</option>
</select>
          </div>

          <div class="form-group">
            <label for="article-ean">EAN</label>
            <input type="text" id="article-ean" />
          </div>

          <div class="form-group">
            <label for="article-vat-rate">TVA</label>
            <select id="article-vat-rate">
              <option value="5.50">5.5%</option>
              <option value="10">10%</option>
              <option value="20">20%</option>
              <option value="2.10">2.1%</option>
              <option value="0">0%</option>
            </select>
          </div>

          <div class="form-group">
            <label for="article-sector">Secteur</label>
            <select id="article-sector">
              <option value="">-- Choisir --</option>
              <option value="TRAD">TRAD</option>
              <option value="LS">LS</option>
              <option value="EMB">EMB</option>
              <option value="SCE">SCE</option>
              <option value="FE">FE</option>
            </select>
          </div>

          <div class="form-group">
            <label for="article-category">Catégorie</label>
            <select id="article-category">
  <option value="">-- Choisir --</option>
  <option value="Pêché en">Pêché en</option>
  <option value="Elevé en">Elevé en</option>
  <option value="EMBALLAGE">EMBALLAGE</option>
  <option value="POISSONNERIE_LS">POISSONNERIE_LS</option>
  <option value="EPICERIE_TRAITEUR">EPICERIE_TRAITEUR</option>
  <option value="FABRICATION">FABRICATION</option>
  <option value="frais emballé">frais emballé</option>
</select>
          </div>

          <div class="form-group">
            <label for="article-latin-name">Nom latin</label>
            <input type="text" id="article-latin-name" />
          </div>

          <div class="form-group">
            <label for="article-fao-zone">Zone FAO</label>
            <input type="text" id="article-fao-zone" />
          </div>

          <div class="form-group">
            <label for="article-sous-zone">Sous-zone</label>
            <input type="text" id="article-sous-zone" />
          </div>

          <div class="form-group">
            <label for="article-engin">Engin</label>
            <input type="text" id="article-engin" />
          </div>

          <div class="form-group form-group-full">
            <label for="article-allergenes">Allergènes</label>
            <input type="text" id="article-allergenes" />
          </div>

          <div class="form-group">
            <label for="article-display-name">Nom affiché rayon</label>
            <input type="text" id="article-display-name" />
          </div>

          <div class="form-group">
            <label for="article-purchase-unit">Unité achat</label>
            <select id="article-purchase-unit">
  <option value="">-- Choisir --</option>
  <option value="kg">kg</option>
  <option value="piece">piece</option>
  <option value="barquette">barquette</option>
  <option value="colis">colis</option>
  <option value="sachet">sachet</option>
  <option value="pot">pot</option>
  <option value="bocal">bocal</option>
  <option value="litre">litre</option>
  <option value="unite">unite</option>
</select>
          </div>

          <div class="form-group">
            <label for="article-stock-unit">Unité stock</label>
            <select id="article-stock-unit">
  <option value="">-- Choisir --</option>
  <option value="kg">kg</option>
  <option value="piece">piece</option>
  <option value="barquette">barquette</option>
  <option value="colis">colis</option>
  <option value="sachet">sachet</option>
  <option value="pot">pot</option>
  <option value="bocal">bocal</option>
  <option value="litre">litre</option>
  <option value="unite">unite</option>
</select>
          </div>

          <div class="form-group">
            <label for="article-sale-unit">Unité vente</label>
            <select id="article-sale-unit">
  <option value="">-- Choisir --</option>
  <option value="kg">kg</option>
  <option value="piece">piece</option>
  <option value="barquette">barquette</option>
  <option value="colis">colis</option>
  <option value="sachet">sachet</option>
  <option value="pot">pot</option>
  <option value="bocal">bocal</option>
  <option value="litre">litre</option>
  <option value="unite">unite</option>
</select>
          </div>

          <div class="form-group">
            <label for="article-active">Actif</label>
            <select id="article-active">
              <option value="true">Oui</option>
              <option value="false">Non</option>
            </select>
          </div>
        </div>

        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./js/config.js"></script>

  <script src="./js/articles.js?v=3"></script>
</body>
</html>
