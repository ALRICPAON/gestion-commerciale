<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Articles - Gestion Commerciale</title>
  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/pages/articles.css?v=10" />
</head>
<body class="app-page">
  <header class="topbar">
    <div>
      <h1 class="app-title">Gestion Commerciale</h1>
      <p class="app-subtitle">Articles / Produits</p>
    </div>

    <div class="topbar-right">
      <div class="user-box">
        <span id="user-name">Utilisateur</span>
      </div>

      <div class="department-switcher">
        <label for="department-select">Service :</label>
        <select id="department-select"></select>
      </div>

      <button id="back-home-btn" class="btn btn-secondary">Accueil</button>
      <button id="logout-btn" class="btn btn-secondary">Déconnexion</button>
    </div>
  </header>

  <main class="main-content">
    <section class="welcome-card">
      <div class="card-header-row">
        <div>
          <h2>Articles / Produits</h2>
          <p>Gestion des produits de négoce : familles, TVA, prix, unités et données de traçabilité.</p>
        </div>
        <button id="create-article-btn" class="btn btn-primary">+ Créer un article</button>
      </div>

      <div class="filters-grid">
        <div class="form-group">
          <label for="search-input">Recherche</label>
          <input
            type="text"
            id="search-input"
            placeholder="PLU, désignation, EAN, nom latin..."
          />
        </div>

        <div class="form-group">
          <label for="family-filter">Famille</label>
          <select id="family-filter">
            <option value="">Toutes</option>
          </select>
        </div>

        <div class="form-group">
          <label for="article-department-filter">Service des articles</label>
          <select id="article-department-filter">
            <option value="">Tous les services</option>
          </select>
        </div>

        <div class="form-group">
          <label for="status-filter">Statut</label>
          <select id="status-filter">
            <option value="">Tous</option>
            <option value="true">Actifs</option>
            <option value="false">Inactifs</option>
          </select>
        </div>

        <div class="form-group filter-actions">
          <label>&nbsp;</label>
          <button id="refresh-btn" class="btn btn-secondary">Actualiser</button>
        </div>
      </div>
    </section>

    <section class="welcome-card">
      <div id="articles-feedback" class="feedback-box"></div>

      <div class="table-wrapper">
        <table class="data-table">
          <thead>
            <tr>
              <th>PLU</th>
              <th>Désignation</th>
              <th>Service</th>
              <th>Famille</th>
              <th>Unité</th>
              <th>TVA</th>
              <th>PV HT</th>
              <th>PV TTC</th>
              <th>Statut</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="articles-tbody">
            <tr>
              <td colspan="10">Chargement des articles...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <div id="article-modal" class="modal-overlay hidden">
    <div class="modal-card article-modal-card">
      <div class="modal-header">
        <h3 id="modal-title">Créer un article</h3>
        <button id="close-modal-btn" class="btn btn-secondary">Fermer</button>
      </div>

      <form id="article-form" class="modal-form">
        <input type="hidden" id="article-id" />

        <div class="form-grid">
          <div class="form-group">
            <label for="article-plu">PLU</label>
            <input type="text" id="article-plu" required />
          </div>

          <div class="form-group">
            <label for="article-designation">Désignation</label>
            <input type="text" id="article-designation" required />
          </div>

          <div class="form-group">
            <label for="article-unit">Unité principale</label>
            <select id="article-unit">
              <option value="kg">kg</option>
              <option value="piece">pièce</option>
              <option value="colis">colis</option>
              <option value="caisse">caisse</option>
              <option value="barquette">barquette</option>
              <option value="sachet">sachet</option>
              <option value="unite">unité</option>
            </select>
          </div>

          <div class="form-group">
            <label for="article-ean">EAN</label>
            <input type="text" id="article-ean" />
          </div>

          <div class="form-group">
            <label for="article-family">Famille</label>
            <select id="article-family">
              <option value="">-- Choisir --</option>
            </select>
          </div>

          <div class="form-group">
            <label for="article-category">Origine produit</label>
            <select id="article-category">
              <option value="">-- Choisir --</option>
              <option value="Pêché en">Pêché en</option>
              <option value="Elevé en">Élevé en</option>
              <option value="Décongelé">Décongelé</option>
              <option value="Transformé">Transformé</option>
              <option value="Autre">Autre</option>
            </select>
          </div>

          <div class="form-group">
            <label for="article-latin-name">Nom latin</label>
            <input type="text" id="article-latin-name" />
          </div>

          <div class="form-group">
            <label for="article-fao-zone">Zone FAO</label>
            <input type="text" id="article-fao-zone" />
          </div>

          <div class="form-group">
            <label for="article-sous-zone">Sous-zone</label>
            <input type="text" id="article-sous-zone" />
          </div>

          <div class="form-group">
            <label for="article-engin">Engin / méthode</label>
            <input type="text" id="article-engin" />
          </div>

          <div class="form-group form-group-full">
            <label for="article-allergenes">Allergènes</label>
            <input type="text" id="article-allergenes" />
          </div>

          <div class="form-group">
            <label for="article-display-name">Nom affiché</label>
            <input type="text" id="article-display-name" />
          </div>

          <div class="form-group">
            <label for="article-purchase-unit">Unité achat</label>
            <select id="article-purchase-unit">
              <option value="">-- Choisir --</option>
              <option value="kg">kg</option>
              <option value="piece">pièce</option>
              <option value="colis">colis</option>
              <option value="caisse">caisse</option>
              <option value="barquette">barquette</option>
              <option value="sachet">sachet</option>
              <option value="unite">unité</option>
            </select>
          </div>

          <div class="form-group">
            <label for="article-stock-unit">Unité stock</label>
            <select id="article-stock-unit">
              <option value="">-- Choisir --</option>
              <option value="kg">kg</option>
              <option value="piece">pièce</option>
              <option value="colis">colis</option>
              <option value="caisse">caisse</option>
              <option value="barquette">barquette</option>
              <option value="sachet">sachet</option>
              <option value="unite">unité</option>
            </select>
          </div>

          <div class="form-group">
            <label for="article-sale-unit">Unité vente</label>
            <select id="article-sale-unit">
              <option value="">-- Choisir --</option>
              <option value="kg">kg</option>
              <option value="piece">pièce</option>
              <option value="colis">colis</option>
              <option value="caisse">caisse</option>
              <option value="barquette">barquette</option>
              <option value="sachet">sachet</option>
              <option value="unite">unité</option>
            </select>
          </div>

          <div class="form-group">
            <label for="article-vat-rate">TVA (%)</label>
            <select id="article-vat-rate">
              <option value="5.5">5,5 %</option>
              <option value="10">10 %</option>
              <option value="20">20 %</option>
            </select>
          </div>

          <div class="form-group">
            <label for="article-purchase-price-ex-vat">PA HT</label>
            <input type="number" step="0.0001" id="article-purchase-price-ex-vat" />
          </div>

          <div class="form-group">
            <label for="article-sale-price-ex-vat">PV HT</label>
            <input type="number" step="0.0001" id="article-sale-price-ex-vat" />
          </div>

          <div class="form-group">
            <label for="article-sale-price-inc-vat">PV TTC</label>
            <input type="number" step="0.0001" id="article-sale-price-inc-vat" />
          </div>

          <div class="form-group">
            <label for="article-active">Actif</label>
            <select id="article-active">
              <option value="true">Oui</option>
              <option value="false">Non</option>
            </select>
          </div>
        </div>

        <div class="modal-actions">
          <button type="submit" class="btn btn-primary">Enregistrer</button>
        </div>
      </form>
    </div>
  </div>

  <script src="./js/config.js"></script>
  <script src="./js/articles.js?v=11"></script>
</body>
</html>
