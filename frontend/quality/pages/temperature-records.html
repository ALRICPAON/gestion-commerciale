<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Relevés températures - ALTA MARÉE</title>
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../css/quality.css?v=5" />
</head>
<body class="app-page">
  <header class="topbar"><div class="topbar-left"><h1 class="app-title">ALTA MARÉE</h1><p class="app-subtitle">Relevés Températures</p></div><div class="topbar-right"><button class="btn btn-secondary" onclick="window.location.href='./temperature-settings.html'">Paramètres</button><button class="btn btn-secondary" onclick="window.location.href='./dashboard.html'">Qualité</button><button class="btn btn-secondary" onclick="window.location.href='../../home.html'">Accueil</button></div></header>
  <main class="main-content">
    <section class="welcome-card"><span class="section-kicker">Chaîne du froid</span><h2>Relevés Températures</h2><p>Saisie et historique des contrôles froid.</p></section>
    <div id="temperature-record-feedback" class="page-feedback hidden"></div><section id="temperature-record-summary" class="quality-grid"></section>
    <section class="quality-card">
      <div class="quality-section-header"><div><h3>Relevés attendus</h3><p class="quality-muted">Tâches qualité température dues aujourd'hui ou en retard.</p></div><label class="quality-muted"><input id="temperature-due-include-upcoming" type="checkbox"> Inclure à venir</label></div>
      <div id="temperature-due-readings" class="quality-list-grid"></div>
    </section>
    <section class="quality-card"><h3>Nouveau relevé</h3><form id="temperature-record-form" class="quality-form-grid"><input id="temperature-record-id" type="hidden"><input id="temperature-record-quality-task-id" type="hidden"><label>Type * <select id="temperature-record-type" class="form-input" required></select></label><label>Valeur * <input id="temperature-record-value" class="form-input" type="number" step="0.01" required></label><label>Unité <input id="temperature-record-unit" class="form-input" value="°C"></label><label>Date/heure * <input id="temperature-record-recorded-at" class="form-input" type="datetime-local" required></label><label>Origine <select id="temperature-record-source" class="form-input"><option value="manual">Manuel</option><option value="iot">IoT</option><option value="import">Import</option><option value="api">API</option></select></label><label>Zone <select id="temperature-record-zone-id" class="form-input"></select></label><label>Équipement <select id="temperature-record-equipment-id" class="form-input"></select></label><label>Commentaire <textarea id="temperature-record-comment" class="form-input"></textarea></label><div class="quality-actions"><button class="btn btn-primary" type="submit">Enregistrer</button><button id="temperature-record-cancel-btn" class="btn btn-secondary" type="button">Annuler modification</button></div></form></section>
    <section class="quality-card"><h3>Historique</h3><div class="quality-toolbar"><label>Recherche <input id="temperature-record-search" class="form-input" type="search"></label><label>Type <select id="temperature-record-filter-type" class="form-input"></select></label><label>Zone <select id="temperature-record-filter-zone" class="form-input"></select></label><label>Équipement <select id="temperature-record-filter-equipment" class="form-input"></select></label><label>Statut <select id="temperature-record-filter-alert" class="form-input"><option value="">Tous</option><option value="compliant">Conforme</option><option value="warning">Surveillance</option><option value="out_of_limits">Hors limite</option></select></label><label>Début <input id="temperature-record-start-date" class="form-input" type="date"></label><label>Fin <input id="temperature-record-end-date" class="form-input" type="date"></label></div><div class="quality-actions"><button id="temperature-record-export-csv" class="btn btn-secondary" type="button">Export CSV</button></div><div id="temperature-record-chart" class="quality-temperature-chart"></div><div class="quality-table-wrapper"><table class="quality-table"><thead><tr><th>Date/heure</th><th>Zone</th><th>Équipement</th><th>Type</th><th>Valeur</th><th>Seuils</th><th>Statut</th><th>Opérateur</th><th>Commentaire</th><th>Actions</th></tr></thead><tbody id="temperature-record-table-body"></tbody></table></div></section>
  </main>
  <script src="../../js/config.js"></script><script src="../js/permissions.js"></script><script src="../js/digital-twin-api.js"></script><script src="../js/temperature-api.js?v=4"></script><script src="../js/temperature-records.js?v=2"></script>
</body>
</html>
