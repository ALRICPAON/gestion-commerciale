<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Équipements qualité - ALTA MARÉE</title><link rel="stylesheet" href="../../css/app.css" /><link rel="stylesheet" href="../css/quality.css" /></head>
<body class="app-page">
  <header class="topbar"><div class="topbar-left"><h1 class="app-title">ALTA MARÉE</h1><p class="app-subtitle">Équipements qualité</p></div><div class="topbar-right"><button class="btn btn-secondary" onclick="window.location.href='./dashboard.html'">Qualité</button><button class="btn btn-secondary" onclick="window.location.href='../../home.html'">Accueil</button></div></header>
  <main class="main-content">
    <section class="welcome-card"><span class="section-kicker">Jumeau numérique</span><h2>Équipements qualité</h2><p>Référentiel des équipements rattachés aux zones qualité.</p></section>
    <section class="quality-card"><div class="quality-toolbar"><label>Recherche <input id="equipment-search" class="form-input" type="search"></label><label>Statut <select id="equipment-status" class="form-input"><option value="">Tous actifs</option><option value="active">Actif</option><option value="inactive">Inactif</option><option value="maintenance">Maintenance</option><option value="out_of_service">Hors service</option><option value="archived">Archivé</option></select></label><label>Type <input id="equipment-type" class="form-input"></label><label>Zone <select id="equipment-zone-filter" class="form-input"></select></label><label><input id="equipment-archived" type="checkbox"> Afficher archivés</label><button id="equipment-add-btn" class="btn btn-primary" type="button">Ajouter un équipement</button></div></section>
    <section id="equipment-form-card" class="quality-card hidden"><h3 id="equipment-form-title">Nouvel équipement</h3><form id="equipment-form" class="quality-form-grid"><input type="hidden" id="equipment-id"><label>Zone * <select id="equipment-zone-id" class="form-input" required></select></label><label>Code * <input id="equipment-code" class="form-input" required></label><label>Nom * <input id="equipment-name" class="form-input" required></label><label>Type * <input id="equipment-form-type" class="form-input" required></label><label>Fabricant <input id="equipment-manufacturer" class="form-input"></label><label>Modèle <input id="equipment-model" class="form-input"></label><label>N° série <input id="equipment-serial" class="form-input"></label><label>Fournisseur <input id="equipment-supplier" class="form-input"></label><label>Achat <input id="equipment-purchase-date" class="form-input" type="date"></label><label>Fin garantie <input id="equipment-warranty-date" class="form-input" type="date"></label><label>Statut <select id="equipment-form-status" class="form-input"><option value="active">Actif</option><option value="inactive">Inactif</option><option value="maintenance">Maintenance</option><option value="out_of_service">Hors service</option><option value="archived">Archivé</option></select></label><label>Criticité <select id="equipment-criticality" class="form-input"><option value="low">Faible</option><option value="medium">Moyenne</option><option value="high">Haute</option><option value="critical">Critique</option></select></label><label><input id="equipment-food-contact" type="checkbox"> Contact alimentaire</label><label><input id="equipment-temperature" type="checkbox"> Suivi température</label><label><input id="equipment-cleaning" type="checkbox"> Nettoyage requis</label><label><input id="equipment-maintenance" type="checkbox"> Maintenance requise</label><label><input id="equipment-calibration" type="checkbox"> Étalonnage requis</label><label>Description <textarea id="equipment-description" class="form-input"></textarea></label><div class="quality-actions"><button class="btn btn-primary" type="submit">Enregistrer</button><button id="equipment-cancel-btn" class="btn btn-secondary" type="button">Annuler</button></div></form></section>
    <div id="equipment-feedback" class="page-feedback hidden"></div><section id="equipment-list" class="quality-list-grid"></section>
  </main>
  <script src="../../js/config.js"></script><script src="../js/permissions.js"></script><script src="../js/digital-twin-api.js"></script><script src="../js/equipments.js"></script>
</body></html>
