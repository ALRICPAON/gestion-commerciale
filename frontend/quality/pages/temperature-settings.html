<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Paramètres températures - ALTA MARÉE</title>
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../css/quality.css?v=5" />
</head>
<body class="app-page">
  <header class="topbar"><div class="topbar-left"><h1 class="app-title">ALTA MARÉE</h1><p class="app-subtitle">Paramètres Températures</p></div><div class="topbar-right"><button class="btn btn-secondary" onclick="window.location.href='./temperature-records.html'">Relevés</button><button class="btn btn-secondary" onclick="window.location.href='./dashboard.html'">Qualité</button><button class="btn btn-secondary" onclick="window.location.href='../../home.html'">Accueil</button></div></header>
  <main class="main-content">
    <section class="welcome-card"><span class="section-kicker">Chaîne du froid</span><h2>Paramètres Températures</h2><p>Configurer les règles métier et les lier au planning qualité.</p></section>
    <div id="temperature-settings-feedback" class="page-feedback hidden"></div>
    <section class="quality-card"><div class="quality-actions"><button id="temperature-setting-add-btn" class="btn btn-primary" type="button">Créer un paramétrage</button></div></section>
    <section id="temperature-setting-form-card" class="quality-card hidden">
      <h3 id="temperature-setting-form-title">Nouveau paramétrage</h3>
      <form id="temperature-setting-form" class="quality-form-grid">
        <input id="temperature-setting-id" type="hidden">
        <label>Type * <select id="temperature-setting-type" class="form-input" required></select></label>
        <label>Mini <input id="temperature-setting-min" class="form-input" type="number" step="0.01"></label>
        <label>Maxi <input id="temperature-setting-max" class="form-input" type="number" step="0.01"></label>
        <label>Unité <input id="temperature-setting-unit" class="form-input" value="°C"></label>
        <label>Zone <select id="temperature-setting-zone-id" class="form-input"></select></label>
        <label>Équipement <select id="temperature-setting-equipment-id" class="form-input"></select></label>
        <label>Valide depuis <input id="temperature-setting-from" class="form-input" type="date"></label>
        <label>Valide jusqu'à <input id="temperature-setting-until" class="form-input" type="date"></label>
        <label><input id="temperature-setting-active" type="checkbox" checked> Actif</label>

        <fieldset class="quality-form-wide quality-inline-fieldset">
          <legend>Planification qualité</legend>
          <label>Mode<select id="temperature-setting-planning-mode" class="form-input"><option value="existing">Tâche qualité existante</option><option value="new">Créer une nouvelle tâche</option><option value="none">Non planifié</option></select></label>
          <label id="temperature-setting-existing-task-label">Tâche existante<select id="temperature-setting-quality-task-id" class="form-input"></select></label>
          <label id="temperature-setting-task-title-label">Titre tâche<input id="temperature-setting-task-title" class="form-input"></label>
          <label id="temperature-setting-task-responsible-label">Responsable<select id="temperature-setting-task-responsible" class="form-input"><option value="">Non assigné</option></select></label>
          <label id="temperature-setting-task-frequency-value-label">Fréquence<input id="temperature-setting-frequency-value" class="form-input" type="number" min="1"></label>
          <label id="temperature-setting-task-frequency-unit-label">Unité fréquence<select id="temperature-setting-frequency-unit" class="form-input"><option value="">Non définie</option><option value="hours">Heures</option><option value="days">Jours</option><option value="weeks">Semaines</option><option value="months">Mois</option><option value="events">Événements</option></select></label>
          <label id="temperature-setting-task-target-time-label">Heure cible <input id="temperature-setting-target-time" class="form-input" type="time"></label>
        </fieldset>

        <div class="quality-actions quality-form-wide"><button class="btn btn-primary" type="submit">Enregistrer</button><button id="temperature-setting-cancel-btn" class="btn btn-secondary" type="button">Annuler</button></div>
      </form>
    </section>
    <section id="temperature-setting-list" class="quality-list-grid"></section>
  </main>
  <script src="../../js/config.js"></script><script src="../js/permissions.js"></script><script src="../js/digital-twin-api.js"></script><script src="../js/tasks-api.js?v=1"></script><script src="../js/temperature-api.js?v=3"></script><script src="../js/temperature-settings.js?v=2"></script>
</body>
</html>
