<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Températures qualité - ALTA MARÉE</title>
  <link rel="stylesheet" href="../../css/app.css" />
  <link rel="stylesheet" href="../css/quality.css?v=3" />
</head>
<body class="app-page">
  <header class="topbar">
    <div class="topbar-left"><h1 class="app-title">ALTA MARÉE</h1><p class="app-subtitle">Températures & chaîne du froid</p></div>
    <div class="topbar-right"><button class="btn btn-secondary" onclick="window.location.href='./dashboard.html'">Qualité</button><button class="btn btn-secondary" onclick="window.location.href='../../home.html'">Accueil</button></div>
  </header>
  <main class="main-content">
    <section class="welcome-card"><span class="section-kicker">QMS</span><h2>Températures</h2><p>Suivi manuel et préparation IoT de la chaîne du froid.</p></section>
    <div id="temperature-feedback" class="page-feedback hidden"></div>
    <section class="quality-grid" id="temperature-summary"></section>
    <section class="quality-card"><div class="quality-actions"><button id="temperature-add-btn" class="btn btn-primary" type="button">Ajouter un relevé</button><button id="temperature-limits-btn" class="btn btn-secondary" type="button">Configurer les limites</button></div></section>
    <section id="temperature-form-card" class="quality-card hidden"><h3 id="temperature-form-title">Nouveau relevé</h3><form id="temperature-form" class="quality-form-grid"><input id="temperature-id" type="hidden"><label>Type * <select id="temperature-type" class="form-input" required></select></label><label>Valeur * <input id="temperature-value" class="form-input" type="number" step="0.01" required></label><label>Unité <input id="temperature-unit" class="form-input" value="°C"></label><label>Date/heure * <input id="temperature-recorded-at" class="form-input" type="datetime-local" required></label><label>Origine <select id="temperature-source" class="form-input"><option value="manual">Manuel</option><option value="iot">IoT</option><option value="import">Import</option><option value="api">API</option></select></label><label>Zone <select id="temperature-zone-id" class="form-input"></select></label><label>Équipement <select id="temperature-equipment-id" class="form-input"></select></label><label>Commentaire <textarea id="temperature-comment" class="form-input"></textarea></label><div class="quality-actions"><button class="btn btn-primary" type="submit">Enregistrer</button><button id="temperature-cancel-btn" class="btn btn-secondary" type="button">Annuler</button></div></form></section>
    <section id="temperature-limit-card" class="quality-card hidden"><h3>Limites configurables</h3><form id="temperature-limit-form" class="quality-form-grid"><input id="temperature-limit-id" type="hidden"><label>Type * <select id="temperature-limit-type" class="form-input" required></select></label><label>Mini <input id="temperature-limit-min" class="form-input" type="number" step="0.01"></label><label>Maxi <input id="temperature-limit-max" class="form-input" type="number" step="0.01"></label><label>Unité <input id="temperature-limit-unit" class="form-input" value="°C"></label><label>Zone <select id="temperature-limit-zone-id" class="form-input"></select></label><label>Équipement <select id="temperature-limit-equipment-id" class="form-input"></select></label><label>Valide depuis <input id="temperature-limit-from" class="form-input" type="date"></label><label>Valide jusqu'à <input id="temperature-limit-until" class="form-input" type="date"></label><label><input id="temperature-limit-active" type="checkbox" checked> Limite active</label><div class="quality-actions"><button class="btn btn-primary" type="submit">Enregistrer la limite</button><button id="temperature-limit-cancel-btn" class="btn btn-secondary" type="button">Fermer</button></div></form><section id="temperature-limit-list" class="quality-list-grid"></section></section>
    <section class="quality-card"><h3>Historique</h3><div class="quality-toolbar"><label>Recherche <input id="temperature-search" class="form-input" type="search"></label><label>Type <select id="temperature-filter-type" class="form-input"></select></label><label>Zone <select id="temperature-filter-zone" class="form-input"></select></label><label>Équipement <select id="temperature-filter-equipment" class="form-input"></select></label><label>Alerte <select id="temperature-filter-alert" class="form-input"><option value="">Toutes</option><option value="compliant">Conforme</option><option value="warning">Surveillance</option><option value="out_of_limits">Hors limites</option></select></label><label>Origine <select id="temperature-filter-source" class="form-input"><option value="">Toutes</option><option value="manual">Manuel</option><option value="iot">IoT</option><option value="import">Import</option><option value="api">API</option></select></label><label>Début <input id="temperature-start-date" class="form-input" type="date"></label><label>Fin <input id="temperature-end-date" class="form-input" type="date"></label></div><div class="quality-actions"><button id="temperature-export-csv" class="btn btn-secondary" type="button">Export CSV</button><button class="btn btn-secondary" type="button" disabled title="Prévu dans une PR export PDF">Export PDF à venir</button></div><div id="temperature-chart" class="quality-temperature-chart"></div><div class="quality-table-wrapper"><table class="quality-table"><thead><tr><th>Date</th><th>Type</th><th>Zone</th><th>Équipement</th><th>Valeur</th><th>Statut</th><th>Origine</th><th>Actions</th></tr></thead><tbody id="temperature-table-body"></tbody></table></div></section>
  </main>
  <script src="../../js/config.js"></script>
  <script src="../js/permissions.js"></script>
  <script src="../js/digital-twin-api.js"></script>
  <script src="../js/temperature-api.js?v=1"></script>
  <script src="../js/temperatures.js?v=1"></script>
</body>
</html>
