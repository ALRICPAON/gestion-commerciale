<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <title>Stats articles</title>

  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/pages/compta-articles.css?v=2" />
</head>

<body class="app-page">
<header class="topbar">
  <div class="topbar-left">
    <h1 class="app-title">Statistiques articles</h1>
    <p class="app-subtitle">Pilotage ventes, volumes et marges</p>
  </div>

  <div class="topbar-right">
    <button id="back-btn" class="btn btn-secondary">Comptabilité</button>
    <button id="logout-btn" class="btn btn-secondary">Déconnexion</button>
  </div>
</header>

<main class="articles-stats-page">
  <section class="articles-card">
    <div class="articles-filters">
      <div class="articles-field">
        <label>Du</label>
        <input type="date" id="start-date" />
      </div>

      <div class="articles-field">
        <label>Au</label>
        <input type="date" id="end-date" />
      </div>

      <div class="articles-field">
        <label>Article</label>
        <select id="article-filter">
          <option value="">Tous</option>
        </select>
      </div>

      <button id="load-btn" class="btn btn-primary">Charger</button>
      <button id="print-btn" class="btn btn-secondary">Imprimer</button>
    </div>
  </section>

  <section class="articles-kpis">
    <article class="article-kpi">
      <span>CA HT</span>
      <strong id="kpi-ca">0 €</strong>
    </article>

    <article class="article-kpi">
      <span>Coût HT</span>
      <strong id="kpi-cost">0 €</strong>
    </article>

    <article class="article-kpi">
      <span>Marge HT</span>
      <strong id="kpi-margin">0 €</strong>
    </article>

    <article class="article-kpi">
      <span>% marge</span>
      <strong id="kpi-margin-pct">0 %</strong>
    </article>

    <article class="article-kpi">
      <span>Volume vendu</span>
      <strong id="kpi-volume">0</strong>
    </article>

    <article class="article-kpi">
      <span>Nb articles</span>
      <strong id="kpi-count">0</strong>
    </article>
  </section>

  <section class="articles-card">
    <h2>Articles</h2>

    <div class="table-wrapper">
      <table class="articles-table">
        <thead>
          <tr>
            <th>PLU</th>
            <th>Article</th>
            <th>Volume</th>
            <th>Unité</th>
            <th>CA HT</th>
            <th>Coût HT</th>
            <th>Marge HT</th>
            <th>% marge</th>
            <th>Anomalie</th>
          </tr>
        </thead>

        <tbody id="articles-body">
          <tr>
            <td colspan="9">Charge une période.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<script src="./js/config.js"></script>
<script type="module" src="./js/compta-articles.js?v=1"></script>
</body>
</html>
