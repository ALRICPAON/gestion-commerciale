<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <title>Stats fournisseurs</title>

  <link rel="stylesheet" href="./css/app.css" />
  <link rel="stylesheet" href="./css/pages/compta-suppliers.css?v=2" />
</head>

<body class="app-page">

<header class="topbar">
  <div class="topbar-left">
    <h1 class="app-title">Statistiques fournisseurs</h1>
    <p class="app-subtitle">
      Pilotage achats et volumes
    </p>
  </div>

  <div class="topbar-right">
    <button id="back-btn" class="btn btn-secondary">
      Comptabilité
    </button>

    <button id="logout-btn" class="btn btn-secondary">
      Déconnexion
    </button>
  </div>
</header>

<main class="suppliers-page">

  <section class="suppliers-card">

    <div class="suppliers-filters">

      <div class="suppliers-field">
        <label>Du</label>
        <input type="date" id="start-date" />
      </div>

      <div class="suppliers-field">
        <label>Au</label>
        <input type="date" id="end-date" />
      </div>

      <div class="suppliers-field">
        <label>Fournisseur</label>
        <select id="supplier-filter">
          <option value="">Tous</option>
        </select>
      </div>

      <button id="load-btn" class="btn btn-primary">
        Charger
      </button>

      <button id="print-btn" class="btn btn-secondary">
        Imprimer
      </button>

    </div>

  </section>

  <section class="suppliers-kpis">

    <article class="supplier-kpi">
      <span>Achats HT</span>
      <strong id="kpi-purchases">0 €</strong>
    </article>

    <article class="supplier-kpi">
      <span>Volume acheté</span>
      <strong id="kpi-volume">0</strong>
    </article>

  </section>

  <section class="suppliers-card">

    <h2>Fournisseurs</h2>

    <div class="table-wrapper">

      <table class="suppliers-table">

        <thead>
          <tr>
  <th>Code</th>
  <th>Fournisseur</th>
  <th>Achats HT</th>
  <th>CA HT</th>
  <th>Coût HT</th>
  <th>Marge HT</th>
  <th>% marge</th>
  <th>Volume</th>
  <th>Nb achats</th>
  <th>Nb articles</th>
</tr>
        </thead>

        <tbody id="suppliers-body">
          <tr>
            <td colspan="10">
              Charge une période.
            </td>
          </tr>
        </tbody>

      </table>

    </div>

  </section>

</main>

<script src="./js/config.js"></script>
<script type="module" src="./js/compta-suppliers.js?v=1"></script>

</body>
</html>
